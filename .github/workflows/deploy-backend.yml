name: Deploy Webapp to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'styles.css'
      - 'app.js'
      - 'config.js'
      - 'service-worker.js'
      - 'manifest.json'
      - 'icon-*.png'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare webapp folder (exclude backend)
        run: |
          mkdir -p _site
          cp index.html styles.css app.js config.js service-worker.js manifest.json _site/
          cp icon-*.png _site/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
